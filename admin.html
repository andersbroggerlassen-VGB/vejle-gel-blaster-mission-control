<!doctype html><html lang="da"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin</title><link rel="stylesheet" href="style.css"></head><body class="scan noise"><div class="wrap"><div class="topbar"><div class="brand"><div class="logo"><img src="logo.png" alt="Vejle Gel Blaster logo"></div><div><h1>Admin Panel</h1><div class="sub">Styrer alle skærme live</div></div></div><div class="status" id="liveStatus">READY</div></div><div class="grid"><div class="panel span4 stack"><h2>Mission</h2><label>Mission navn</label><input id="mission"><label>Briefing tekst</label><textarea id="briefing"></textarea><label>Kampvarighed i minutter</label><input id="duration" type="number" min="1"><div class="row"><button id="saveMission">Gem mission</button><button id="reset" class="danger">Reset alt</button></div></div><div class="panel span4 stack"><h2>Score</h2><div class="row"><div><label>Rødt hold</label><input id="redName"></div><div><label>Blåt hold</label><input id="blueName"></div></div><div class="row"><button class="danger" id="redPlus">+1 Rød</button><button class="bluebtn" id="bluePlus">+1 Blå</button></div><div class="row"><button id="redMinus">-1 Rød</button><button id="blueMinus">-1 Blå</button></div><div class="bigscore"><span class="red" id="rs">0</span> / <span class="blue" id="bs">0</span></div></div><div class="panel span4 stack"><h2>Kampstyring</h2><div class="timer" id="timer">15:00</div><div class="row"><button id="start">Start</button><button id="pause">Pause / Genoptag</button></div><div class="row"><button id="stop" class="danger">Stop / vinder</button><button id="ready">Ready</button></div><div class="row"><button id="soundStart">Lyd: Start</button><button id="soundAlarm">Lyd: Alarm</button></div></div><div class="panel span12 stack"><h2>Kamera links</h2><div class="grid"><div class="span4"><label>Rød kamera stream URL</label><input id="camR" placeholder="https://... eller iframe/video link"></div><div class="span4"><label>Blå kamera stream URL</label><input id="camB"></div><div class="span4"><label>Oversigt kamera stream URL</label><input id="camO"></div></div><button id="saveCams">Gem kameraer</button></div></div><script type="module">import './firebase.js'; const M=window.MC; let S={}; function setv(id,v){document.getElementById(id).value=v??''} function render(s){S=s; liveStatus.textContent=s.status; mission.value=s.mission; briefing.value=s.briefing; redName.value=s.redName; blueName.value=s.blueName; duration.value=Math.round((s.duration||900)/60); camR.value=s.cameraRed||'';camB.value=s.cameraBlue||'';camO.value=s.cameraOverview||''; rs.textContent=s.redScore; bs.textContent=s.blueScore; pause.textContent=s.status==='LIVE'?'Pause':'Genoptag';} M.subscribe(render); M.tickLocal(rem=>timer.textContent=M.fmt(rem)); saveMission.onclick=()=>M.save({mission:mission.value,briefing:briefing.value,duration:Number(duration.value||15)*60,remaining:Number(duration.value||15)*60}); saveCams.onclick=()=>M.save({cameraRed:camR.value,cameraBlue:camB.value,cameraOverview:camO.value}); redPlus.onclick=()=>M.save({redScore:(S.redScore||0)+1,redName:redName.value,blueName:blueName.value}); bluePlus.onclick=()=>M.save({blueScore:(S.blueScore||0)+1,redName:redName.value,blueName:blueName.value}); redMinus.onclick=()=>M.save({redScore:Math.max(0,(S.redScore||0)-1)}); blueMinus.onclick=()=>M.save({blueScore:Math.max(0,(S.blueScore||0)-1)}); start.onclick=()=>{M.save({redName:redName.value,blueName:blueName.value});M.startMission();M.playBeep('start')}; pause.onclick=()=>M.togglePauseResume(); stop.onclick=()=>{M.stopMission();M.playBeep('complete')}; ready.onclick=()=>M.save({status:'READY',winner:'',remaining:S.duration}); reset.onclick=()=>M.resetAll(); soundStart.onclick=()=>M.playBeep('start'); soundAlarm.onclick=()=>M.playBeep('alarm');</script></body></html>
