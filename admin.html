<!doctype html><html lang="da"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin</title><link rel="stylesheet" href="style.css"></head><body><div class="wrap"><div class="topbar"><div class="brand"><img src="logo.png"><div><h1>ADMIN PANEL</h1><div class="sub">Styrer alle skærme live</div></div></div><nav class="nav"><a href="index.html">Dashboard</a><a href="score.html">Score</a><a href="briefing.html">Briefing</a></nav><div class="status" id="status">READY</div></div><div class="grid adminGrid"><section class="panel span4 stack"><h2>Mission</h2><label>Mission navn</label><input id="mission"><label>Mission type</label><input id="missionType"><label>Briefing tekst</label><textarea id="briefing"></textarea><label>Kampvarighed minutter</label><input id="duration" type="number" min="1"><button id="saveMission">Gem mission</button></section><section class="panel span4 stack"><h2>Score</h2><div class="row"><div><label>Rødt hold</label><input id="redName"></div><div><label>Blåt hold</label><input id="blueName"></div></div><div class="scorebox"><div class="team"><div class="score red" id="rs">0</div></div><div class="vs">VS</div><div class="team"><div class="score blue" id="bs">0</div></div></div><div class="row bigControls"><button class="danger" id="redPlus">+1 Rød</button><button class="bluebtn" id="bluePlus">+1 Blå</button></div><div class="row"><button id="redMinus">-1 Rød</button><button id="blueMinus">-1 Blå</button></div></section><section class="panel span4 stack"><h2>Kampstyring</h2><div class="timer smallTimer" id="timer">15:00</div><div class="row bigControls"><button id="start">Start</button><button id="pause">Pause / Genoptag</button></div><div class="row"><button class="danger" id="stop">Stop / Vinder</button><button id="ready">Ready</button></div><div class="row"><button id="soundStart">Start lyd</button><button id="soundAlarm">Alarm</button></div><button class="danger" id="reset">Nulstil alt</button></section><section class="panel span12 stack"><h2>Kameraer og kort</h2><div class="grid"><div class="span3"><label>Rød kamera URL</label><input id="camR"></div><div class="span3"><label>Blå kamera URL</label><input id="camB"></div><div class="span3"><label>Overblik kamera URL</label><input id="camO"></div><div class="span3"><label>Banekort URL</label><input id="mapUrl"></div></div><button id="saveMedia">Gem media</button></section></div></div><script type="module">import './firebase.js'; const M=window.MC; let S={}; function render(s){S=s;status.textContent=s.status;mission.value=s.mission;missionType.value=s.missionType;briefing.value=s.briefing;redName.value=s.redName;blueName.value=s.blueName;duration.value=Math.round((s.duration||900)/60);camR.value=s.cameraRed;camB.value=s.cameraBlue;camO.value=s.cameraOverview;mapUrl.value=s.mapUrl;rs.textContent=s.redScore;bs.textContent=s.blueScore;pause.textContent=s.status==='LIVE'?'Pause':'Genoptag';} M.subscribe(render); M.tick(r=>timer.textContent=M.fmt(r)); saveMission.onclick=()=>M.save({mission:mission.value,missionType:missionType.value,briefing:briefing.value,duration:Number(duration.value||15)*60,remaining:S.status==='LIVE'?M.calcRemaining(S):Number(duration.value||15)*60}); saveMedia.onclick=()=>M.save({cameraRed:camR.value,cameraBlue:camB.value,cameraOverview:camO.value,mapUrl:mapUrl.value}); redPlus.onclick=()=>M.save({redScore:(S.redScore||0)+1,redName:redName.value,blueName:blueName.value}); bluePlus.onclick=()=>M.save({blueScore:(S.blueScore||0)+1,redName:redName.value,blueName:blueName.value}); redMinus.onclick=()=>M.save({redScore:Math.max(0,(S.redScore||0)-1)}); blueMinus.onclick=()=>M.save({blueScore:Math.max(0,(S.blueScore||0)-1)}); start.onclick=()=>M.startMission(); pause.onclick=()=>M.pauseResume(); stop.onclick=()=>M.stopMission(); ready.onclick=()=>M.save({status:'READY',winner:'',remaining:S.duration,startedAt:0}); reset.onclick=()=>confirm('Nulstil alt?')&&M.resetAll(); soundStart.onclick=()=>M.playLocalSound('start'); soundAlarm.onclick=()=>M.playLocalSound('alarm');</script></body></html>
