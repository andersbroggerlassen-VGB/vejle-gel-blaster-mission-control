<!doctype html><html lang="da"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Score</title><link rel="stylesheet" href="style.css"></head><body class="scan noise"><div class="wrap"><div class="topbar"><div class="brand"><div class="logo"><img src="logo.png" alt="Vejle Gel Blaster logo"></div><div><h1>Live Scoreboard</h1><div class="sub" id="mission">MISSION</div></div></div><div class="status" id="st">READY</div></div><div class="grid scoreboard-grid"><div class="panel span3 score-panel"><div><div class="score-label red" id="rn">RØD</div><div class="bigscore red" id="rs">0</div></div></div><div class="panel span6 score-timer-panel"><div><div class="score-label">KAMPTID</div><div class="timer" id="timer">15:00</div></div></div><div class="panel span3 score-panel"><div><div class="score-label blue" id="bn">BLÅ</div><div class="bigscore blue" id="bs">0</div></div></div><div class="panel span12"><div class="winner" id="winner">AWAITING MISSION</div></div></div><script type="module">import './firebase.js';const M=window.MC;let S={};M.subscribe(s=>{S=s;rn.textContent=s.redName;bn.textContent=s.blueName;rs.textContent=s.redScore;bs.textContent=s.blueScore;mission.textContent=s.mission;st.textContent=s.status;winner.textContent=s.winner?('WINNER: '+s.winner):(s.status==='LIVE'?'MISSION LIVE':s.status)});M.tickLocal(rem=>timer.textContent=M.fmt(rem));</script></body></html>
