<!doctype html><html lang="da"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Scoreboard</title><link rel="stylesheet" href="style.css"></head><body><div class="wrap"><div class="topbar"><div class="brand"><img src="logo.png"><div><h1>LIVE SCOREBOARD</h1><div class="sub">VEJLE GEL BLASTER</div></div></div><div class="status" id="status">READY</div></div><section class="panel"><div class="scorebox"><div class="team"><div id="rn" class="teamName red">RØDT HOLD</div><div id="rs" class="score red">0</div></div><div class="vs">VS</div><div class="team"><div id="bn" class="teamName blue">BLÅT HOLD</div><div id="bs" class="score blue">0</div></div></div><div class="timer" id="timer">15:00</div><h2 id="winner" style="text-align:center"></h2></section></div><script type="module">import './firebase.js'; const M=window.MC; M.subscribe(s=>{status.textContent=s.status;rn.textContent=s.redName;bn.textContent=s.blueName;rs.textContent=s.redScore;bs.textContent=s.blueScore;winner.textContent=s.winner?`VINDER: ${s.winner}`:''}); M.tick(r=>timer.textContent=M.fmt(r));</script></body></html>
